# Alembic configuration for CardLens. The database URL is injected at runtime in migrations/env.py
# from the application settings, so it is intentionally a placeholder here.
[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///./cardlens.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
