# Reward milestones, externalized so tuning thresholds is a data edit (no code change).
# Progress is computed against the user's current portfolio totals: closing reward points for
# REWARD_POINTS milestones, accumulated cashback (INR) for CASHBACK milestones. Thresholds are
# inclusive and should be listed in ascending order per format.
milestones:
  REWARD_POINTS:
    - { key: rp_10k, label: "10,000 reward points", threshold: 10000 }
    - { key: rp_25k, label: "25,000 reward points", threshold: 25000 }
    - { key: rp_50k, label: "50,000 reward points", threshold: 50000 }
    - { key: rp_100k, label: "1,00,000 reward points", threshold: 100000 }
  CASHBACK:
    - { key: cb_1k, label: "Rs 1,000 cashback", threshold: 1000 }
    - { key: cb_5k, label: "Rs 5,000 cashback", threshold: 5000 }
    - { key: cb_10k, label: "Rs 10,000 cashback", threshold: 10000 }
