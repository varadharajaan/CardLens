# CardLens PDF password rules - config-driven, never hardcoded in code.
# Each rule produces one password candidate from user/card attributes. The candidate generator
# (app/pdf) resolves these template tokens, in order, until a PDF unlocks:
#   {name4_lower}   first 4 letters of the name on card, lowercase
#   {name4_upper}   first 4 letters of the name on card, uppercase
#   {name_initials} concatenated initials of the name on card, lowercase
#   {dob_ddmm}      date of birth as DDMM
#   {dob_ddmmyy}    date of birth as DDMMYY
#   {card_last4}    last 4 digits of the card
#   {card_last6}    last 6 digits of the primary card
#   {crn}           customer relationship number, when known
# Add or reorder rules per bank here; no code change is required.
version: 1
rules:
  ICICI:
    - id: name4_lower_dob_ddmm
      description: first 4 letters of name on card (lower) + DOB DDMM
      template: "{name4_lower}{dob_ddmm}"
      example: vara0906
  INDUSIND:
    - id: name4_lower_dob_ddmm
      description: first 4 chars of embossed name (lower) + DOB DDMM
      template: "{name4_lower}{dob_ddmm}"
      example: vara0906
  AXIS:
    - id: name4_upper_dob_ddmm
      description: first 4 letters of name (upper) + DOB DDMM
      template: "{name4_upper}{dob_ddmm}"
      example: VARA0906
    - id: name4_upper_card_last4
      description: first 4 letters of name (upper) + last 4 card digits
      template: "{name4_upper}{card_last4}"
      example: VARA6700
  KOTAK:
    - id: name4_lower_dob_ddmm
      description: first 4 letters of name on card (lower) + DOB DDMM
      template: "{name4_lower}{dob_ddmm}"
      example: vara0906
    - id: initials4_lower_dob_ddmm
      description: leading initials variant (lower) + DOB DDMM
      template: "{name_initials}{dob_ddmm}"
      example: dvar0906
    - id: crn_dob_ddmm
      description: CRN + DOB DDMM when CRN is available
      template: "{crn}{dob_ddmm}"
      example: "123456789012"
  HSBC:
    - id: dob_ddmmyy_card_last6
      description: DOB DDMMYY + last 6 primary card digits
      template: "{dob_ddmmyy}{card_last6}"
      example: 090694XXXXXX
  HDFC:
    - id: name4_lower_dob_ddmm
      description: configurable - first 4 letters of name (lower) + DOB DDMM
      template: "{name4_lower}{dob_ddmm}"
      example: vara0906
    - id: name4_upper_card_last4
      description: configurable - first 4 letters of name (upper) + last 4 card digits
      template: "{name4_upper}{card_last4}"
      example: VARA6700
  SBI:
    - id: dob_ddmmyy_card_last4
      description: configurable - DOB DDMMYY + last 4 card digits
      template: "{dob_ddmmyy}{card_last4}"
      example: 0906946700
  RBL:
    - id: name4_lower_dob_ddmm
      description: configurable - first 4 letters of name (lower) + DOB DDMM
      template: "{name4_lower}{dob_ddmm}"
      example: vara0906
