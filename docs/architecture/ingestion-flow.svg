<svg xmlns="http://www.w3.org/2000/svg" width="900" height="800" viewBox="0 0 900 800" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="800" fill="#ffffff"/>

  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">CardLens - Ingestion: two decoupled workflows</text>
  <text x="450" y="63" text-anchor="middle" font-size="12.5" fill="#6b7280">Same design locally and in Azure - joined only by Blob storage and a blob-created event</text>

  <!-- 1 mail -->
  <rect x="170" y="90" width="560" height="52" rx="8" fill="#2563eb"/>
  <text x="450" y="121" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">New mail detected (pull scan / 6-hour scheduler)</text>
  <line x1="450" y1="142" x2="450" y2="192" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="172" font-size="12" fill="#475569">for each statement mail</text>

  <!-- 2 uploader -->
  <rect x="170" y="196" width="560" height="78" rx="8" fill="#0d9488"/>
  <text x="450" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Workflow A - Uploader (dumb)</text>
  <text x="450" y="244" text-anchor="middle" font-size="12" fill="#ccfbf1">extract ALL attachments (1..n), dedup by SHA-256</text>
  <text x="450" y="262" text-anchor="middle" font-size="12" fill="#ccfbf1">upload each to Blob - does not parse, does not enqueue</text>
  <line x1="450" y1="274" x2="450" y2="324" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="304" font-size="12" fill="#475569">upload</text>

  <!-- 3 blob -->
  <rect x="170" y="328" width="560" height="56" rx="8" fill="#b45309"/>
  <text x="450" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Object store - Blob</text>
  <text x="450" y="372" text-anchor="middle" font-size="12" fill="#fde7cf">Azurite (local)   /   Azure Blob (prod)</text>
  <line x1="450" y1="384" x2="450" y2="434" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="414" font-size="12" fill="#475569">blob-created event</text>

  <!-- 4 bridge -->
  <rect x="170" y="438" width="560" height="94" rx="8" fill="#475569"/>
  <text x="450" y="463" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Blob -&gt; Queue bridge</text>
  <text x="450" y="485" text-anchor="middle" font-size="12" fill="#e2e8f0">prod:  Event Grid (BlobCreated) -&gt; Service Bus</text>
  <text x="450" y="503" text-anchor="middle" font-size="12" fill="#e2e8f0">local:  scripts/ingest_blob.ps1  or  a poller</text>
  <text x="450" y="521" text-anchor="middle" font-size="11" fill="#cbd5e1">(both emit the same Event-Grid-shaped message)</text>
  <line x1="450" y1="532" x2="450" y2="582" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="562" font-size="12" fill="#475569">enqueue</text>

  <!-- 5 worker -->
  <rect x="170" y="586" width="560" height="94" rx="8" fill="#4f46e5"/>
  <text x="450" y="611" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Workflow B - Worker (identical in both envs)</text>
  <text x="450" y="633" text-anchor="middle" font-size="12" fill="#e0e7ff">decide which file to process -&gt; unlock (config password)</text>
  <text x="450" y="651" text-anchor="middle" font-size="12" fill="#e0e7ff">-&gt; parse (versioned profile) -&gt; reward-extract</text>
  <text x="450" y="669" text-anchor="middle" font-size="11" fill="#c7d2fe">idempotent - safe to retry</text>
  <line x1="450" y1="680" x2="450" y2="730" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="710" font-size="12" fill="#475569">persist</text>

  <!-- 6 db -->
  <rect x="170" y="734" width="560" height="56" rx="8" fill="#b45309"/>
  <text x="450" y="758" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Database</text>
  <text x="450" y="778" text-anchor="middle" font-size="12" fill="#fde7cf">PostgreSQL (prod)   /   SQLite (dev)</text>
</svg>
