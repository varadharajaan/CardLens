  <g>
    <rect x="40" y="815" width="1120" height="170" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="40" y="815" width="6" height="170" rx="3" fill="#b45309"/>
    <text x="64" y="841" font-size="15" font-weight="700" fill="#b45309">Data, Infrastructure and External Integrations</text>

    <!-- row 1 -->
    <rect x="64" y="858" width="250" height="52" rx="7" fill="#b45309"/>
    <text x="189" y="878" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">PostgreSQL</text>
    <text x="189" y="896" text-anchor="middle" font-size="11" fill="#fde7cf">Alembic migrations</text>
    <rect x="338" y="858" width="250" height="52" rx="7" fill="#ffffff" stroke="#b45309" stroke-width="1.4"/>
    <text x="463" y="878" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Blob Storage</text>
    <text x="463" y="896" text-anchor="middle" font-size="11" fill="#92400e">Azurite (local)</text>
    <rect x="612" y="858" width="250" height="52" rx="7" fill="#ffffff" stroke="#b45309" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="737" y="878" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Redis / Service Bus *</text>
    <text x="737" y="896" text-anchor="middle" font-size="11" fill="#92400e">background jobs</text>
    <rect x="886" y="858" width="250" height="52" rx="7" fill="#b45309"/>
    <text x="1011" y="878" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Rotating Logs</text>
    <text x="1011" y="896" text-anchor="middle" font-size="11" fill="#fde7cf">10 MiB files</text>

    <!-- row 2 -->
    <rect x="64" y="922" width="250" height="52" rx="7" fill="#ffffff" stroke="#b45309" stroke-width="1.4"/>
    <text x="189" y="942" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Gmail API</text>
    <text x="189" y="960" text-anchor="middle" font-size="11" fill="#92400e">OAuth read-only</text>
    <rect x="338" y="922" width="250" height="52" rx="7" fill="#ffffff" stroke="#b45309" stroke-width="1.4"/>
    <text x="463" y="942" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Azure Doc Intelligence</text>
    <text x="463" y="960" text-anchor="middle" font-size="11" fill="#92400e">OCR fallback</text>
    <rect x="612" y="922" width="250" height="52" rx="7" fill="#ffffff" stroke="#b45309" stroke-width="1.4"/>
    <text x="737" y="942" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Azure Key Vault</text>
    <text x="737" y="960" text-anchor="middle" font-size="11" fill="#92400e">secrets</text>
    <rect x="886" y="922" width="250" height="52" rx="7" fill="#ffffff" stroke="#b45309" stroke-width="1.4"/>
    <text x="1011" y="942" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">App Insights</text>
    <text x="1011" y="960" text-anchor="middle" font-size="11" fill="#92400e">telemetry</text>
  </g>

  <!-- legend -->
  <rect x="373" y="1000" width="18" height="14" rx="3" fill="#4f46e5"/>
  <text x="398" y="1011" font-size="12" fill="#475569">Implemented</text>
  <rect x="503" y="1000" width="18" height="14" rx="3" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
  <text x="528" y="1011" font-size="12" fill="#475569">Planned</text>
  <rect x="610" y="1000" width="18" height="14" rx="3" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="635" y="1011" font-size="12" fill="#475569">* Future / optional</text>
</svg>
