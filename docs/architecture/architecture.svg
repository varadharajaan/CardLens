<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1030" viewBox="0 0 1200 1030" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1200" height="1030" fill="#ffffff"/>

  <!-- title -->
  <text x="600" y="46" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">CardLens - System Architecture</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" fill="#6b7280">Modular monolith - FastAPI backend, Next.js web client, Azure cloud</text>

  <!-- ============ Layer 1: Clients ============ -->
  <g>
    <rect x="40" y="95" width="1120" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="40" y="95" width="6" height="110" rx="3" fill="#2563eb"/>
    <text x="64" y="121" font-size="15" font-weight="700" fill="#2563eb">Client Applications</text>

    <!-- Web App (implemented) -->
    <rect x="64" y="135" width="250" height="55" rx="7" fill="#2563eb"/>
    <text x="189" y="157" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Web App</text>
    <text x="189" y="175" text-anchor="middle" font-size="11.5" fill="#dbeafe">Next.js + React + TS</text>
    <!-- Desktop (future) -->
    <rect x="338" y="135" width="250" height="55" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="463" y="157" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">Desktop *</text>
    <text x="463" y="175" text-anchor="middle" font-size="11.5" fill="#64748b">Tauri v2</text>
    <!-- Browser Extension (future) -->
    <rect x="612" y="135" width="250" height="55" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="737" y="157" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">Browser Extension *</text>
    <text x="737" y="175" text-anchor="middle" font-size="11.5" fill="#64748b">React + TS</text>
    <!-- Mobile (future) -->
    <rect x="886" y="135" width="250" height="55" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="1011" y="157" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">Mobile *</text>
    <text x="1011" y="175" text-anchor="middle" font-size="11.5" fill="#64748b">to be decided</text>
  </g>

  <!-- arrows L1 -> L2 -->
  <line x1="300" y1="206" x2="300" y2="246" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="900" y1="206" x2="900" y2="246" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="231" text-anchor="middle" font-size="12.5" fill="#475569">HTTPS / JSON  -  REST /api/v1</text>

  <!-- ============ Layer 2: API ============ -->
  <g>
    <rect x="40" y="250" width="1120" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="40" y="250" width="6" height="110" rx="3" fill="#0d9488"/>
    <text x="64" y="276" font-size="15" font-weight="700" fill="#0d9488">API Layer - FastAPI (Uvicorn ASGI)</text>

    <rect x="64" y="290" width="250" height="55" rx="7" fill="#0d9488"/>
    <text x="189" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Correlation ID + Logging</text>
    <rect x="338" y="290" width="250" height="55" rx="7" fill="#0d9488"/>
    <text x="463" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">CORS</text>
    <rect x="612" y="290" width="250" height="55" rx="7" fill="#0d9488"/>
    <text x="737" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">RFC 7807 Error Handler</text>
    <rect x="886" y="290" width="250" height="55" rx="7" fill="#0d9488"/>
    <text x="1011" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">OpenAPI / Swagger UI</text>
  </g>

  <!-- arrows L2 -> L3 -->
  <line x1="300" y1="361" x2="300" y2="401" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="900" y1="361" x2="900" y2="401" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="386" text-anchor="middle" font-size="12.5" fill="#475569">middleware  ->  routers  ->  services</text>

