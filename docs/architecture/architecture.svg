  <g>
    <rect x="40" y="405" width="1120" height="210" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="40" y="405" width="6" height="210" rx="3" fill="#4f46e5"/>
    <text x="64" y="431" font-size="15" font-weight="700" fill="#4f46e5">Domain Modules - Modular Monolith</text>

    <!-- row 1 -->
    <rect x="64" y="448" width="250" height="30" rx="6" fill="#4f46e5"/>
    <text x="189" y="463" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#ffffff">auth</text>
    <rect x="338" y="448" width="250" height="30" rx="6" fill="#4f46e5"/>
    <text x="463" y="463" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#ffffff">users</text>
    <rect x="612" y="448" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="737" y="463" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">gmail</text>
    <rect x="886" y="448" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="1011" y="463" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">ingestion</text>

    <!-- row 2 -->
    <rect x="64" y="486" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="189" y="501" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">attachments</text>
    <rect x="338" y="486" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="463" y="501" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">pdf</text>
    <rect x="612" y="486" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="737" y="501" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">parsers</text>
    <rect x="886" y="486" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="1011" y="501" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">cards</text>

    <!-- row 3 -->
    <rect x="64" y="524" width="250" height="30" rx="6" fill="#4f46e5"/>
    <text x="189" y="539" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#ffffff">registry</text>
    <rect x="338" y="524" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="463" y="539" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">rewards</text>
    <rect x="612" y="524" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="737" y="539" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">milestones</text>
    <rect x="886" y="524" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="1011" y="539" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">anomalies</text>

    <!-- row 4 -->
    <rect x="64" y="562" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="189" y="577" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">bank_accounts</text>
    <rect x="338" y="562" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="463" y="577" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">documents</text>
    <rect x="612" y="562" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="737" y="577" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">notifications</text>
    <rect x="886" y="562" width="250" height="30" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.3"/>
    <text x="1011" y="577" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4f46e5">admin</text>
  </g>

  <!-- arrows L3 -> L4 -->
  <line x1="300" y1="616" x2="300" y2="656" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="900" y1="616" x2="900" y2="656" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="641" text-anchor="middle" font-size="12.5" fill="#475569">services  ->  shared kernel</text>

