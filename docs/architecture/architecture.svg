<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="700" viewBox="0 0 1240 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1240" height="700" fill="#ffffff"/>

  <text x="620" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">CardLens - System Architecture</text>
  <text x="620" y="68" text-anchor="middle" font-size="13" fill="#6b7280">Modular-monolith FastAPI backend + a separate ingestion worker; ports select Azurite (dev) or Azure (prod)</text>

  <!-- L1 Clients -->
  <rect x="40" y="88" width="1160" height="100" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="40" y="88" width="6" height="100" rx="3" fill="#2563eb"/>
  <text x="64" y="112" font-size="15" font-weight="700" fill="#2563eb">Clients</text>
  <rect x="64" y="122" width="260" height="56" rx="7" fill="#2563eb"/>
  <text x="194" y="145" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">Web App</text>
  <text x="194" y="164" text-anchor="middle" font-size="11.5" fill="#dbeafe">Next.js + React + TS</text>
  <rect x="348" y="122" width="260" height="56" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="478" y="145" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2563eb">Desktop *</text>
  <text x="478" y="164" text-anchor="middle" font-size="11.5" fill="#64748b">Tauri v2</text>
  <rect x="632" y="122" width="260" height="56" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="762" y="145" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2563eb">Browser Extension *</text>
  <text x="762" y="164" text-anchor="middle" font-size="11.5" fill="#64748b">React + TS</text>
  <rect x="916" y="122" width="260" height="56" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="1046" y="145" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2563eb">Mobile *</text>
  <text x="1046" y="164" text-anchor="middle" font-size="11.5" fill="#64748b">to be decided</text>

  <!-- arrows L1 -> L2 -->
  <line x1="320" y1="188" x2="320" y2="231" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <line x1="900" y1="188" x2="900" y2="231" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <text x="620" y="214" text-anchor="middle" font-size="12.5" fill="#475569">HTTPS / JSON   /api/v1</text>

  <!-- L2 Application tier -->
  <rect x="40" y="233" width="1160" height="200" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="40" y="233" width="6" height="200" rx="3" fill="#4f46e5"/>
  <text x="64" y="257" font-size="15" font-weight="700" fill="#4f46e5">Application tier</text>

  <rect x="64" y="270" width="716" height="112" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.3"/>
  <text x="84" y="292" font-size="13.5" font-weight="700" fill="#4f46e5">FastAPI Backend (modular monolith)</text>
  <text x="84" y="314" font-size="11.5" fill="#1f2937">API edge: JWT auth, RFC 7807 errors, correlation id, OpenAPI</text>
  <text x="84" y="333" font-size="11.5" fill="#1f2937">Domain: auth, users, cards (CardAccount + variants), statements,</text>
  <text x="84" y="351" font-size="11.5" fill="#1f2937">bank_accounts (+ debit cards), registry, rewards, milestones,</text>
  <text x="84" y="369" font-size="11.5" fill="#1f2937">anomalies, gmail, ingestion, documents, notifications, admin</text>

  <rect x="796" y="270" width="340" height="112" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.3"/>
  <text x="816" y="292" font-size="13.5" font-weight="700" fill="#b45309">Ingestion Worker</text>
  <text x="816" y="314" font-size="11" fill="#92400e">separate process - scale-to-zero in prod</text>
  <text x="816" y="333" font-size="11.5" fill="#1f2937">unlock (config password)</text>
  <text x="816" y="351" font-size="11.5" fill="#1f2937">-&gt; parse (versioned profile)</text>
  <text x="816" y="369" font-size="11.5" fill="#1f2937">-&gt; reward-extract -&gt; persist</text>

  <rect x="64" y="394" width="1072" height="30" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="84" y="413" font-size="11" fill="#475569">Ports / adapters (config-selected):  StoragePort | QueuePort | DocIntelPort      ->      Azurite + local worker (dev)   /   Azure Blob + Event Grid + Service Bus + Container Apps (prod)</text>

  <!-- arrows L2 -> L3 -->
  <line x1="320" y1="433" x2="320" y2="476" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <line x1="950" y1="433" x2="950" y2="476" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <text x="620" y="459" text-anchor="middle" font-size="12" fill="#475569">persist / upload / publish        consume / download</text>

  <!-- L3 Data and external -->
  <rect x="40" y="478" width="1160" height="182" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="40" y="478" width="6" height="182" rx="3" fill="#b45309"/>
  <text x="64" y="502" font-size="15" font-weight="700" fill="#b45309">Data and external services</text>

  <rect x="75" y="515" width="340" height="56" rx="7" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="245" y="538" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">PostgreSQL</text>
  <text x="245" y="557" text-anchor="middle" font-size="11" fill="#92400e">Flexible (prod) / SQLite (dev)</text>
  <rect x="450" y="515" width="340" height="56" rx="7" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="620" y="538" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Blob storage</text>
  <text x="620" y="557" text-anchor="middle" font-size="11" fill="#92400e">Azure Blob / Azurite</text>
  <rect x="825" y="515" width="340" height="56" rx="7" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="995" y="538" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Queue + Service Bus</text>
  <text x="995" y="557" text-anchor="middle" font-size="11" fill="#92400e">Service Bus / Azurite Queue</text>

  <rect x="75" y="583" width="340" height="56" rx="7" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="245" y="606" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Document Intelligence</text>
  <text x="245" y="625" text-anchor="middle" font-size="11" fill="#92400e">shared resource (F0) - local + prod</text>
  <rect x="450" y="583" width="340" height="56" rx="7" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="620" y="606" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Key Vault</text>
  <text x="620" y="625" text-anchor="middle" font-size="11" fill="#92400e">secrets / Managed Identity</text>
  <rect x="825" y="583" width="340" height="56" rx="7" fill="#fff7ed" stroke="#d97706" stroke-width="1.2"/>
  <text x="995" y="606" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">App Insights</text>
  <text x="995" y="625" text-anchor="middle" font-size="11" fill="#92400e">telemetry / logs</text>

  <text x="1176" y="690" text-anchor="end" font-size="11" fill="#94a3b8">* future client platform</text>
</svg>
