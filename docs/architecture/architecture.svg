  <g>
    <rect x="40" y="660" width="1120" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="40" y="660" width="6" height="110" rx="3" fill="#475569"/>
    <text x="64" y="686" font-size="15" font-weight="700" fill="#475569">Shared Kernel</text>

    <rect x="64" y="700" width="250" height="55" rx="7" fill="#475569"/>
    <text x="189" y="721" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">Logging</text>
    <text x="189" y="739" text-anchor="middle" font-size="11.5" fill="#e2e8f0">structlog JSON</text>
    <rect x="338" y="700" width="250" height="55" rx="7" fill="#475569"/>
    <text x="463" y="721" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">Security</text>
    <text x="463" y="739" text-anchor="middle" font-size="11.5" fill="#e2e8f0">JWT + argon2</text>
    <rect x="612" y="700" width="250" height="55" rx="7" fill="#475569"/>
    <text x="737" y="721" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">Database</text>
    <text x="737" y="739" text-anchor="middle" font-size="11.5" fill="#e2e8f0">SQLAlchemy 2.0</text>
    <rect x="886" y="700" width="250" height="55" rx="7" fill="#475569"/>
    <text x="1011" y="721" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">Errors / Config</text>
    <text x="1011" y="739" text-anchor="middle" font-size="11.5" fill="#e2e8f0">RFC 7807 + pydantic</text>
  </g>

  <!-- arrows L4 -> L5 -->
  <line x1="300" y1="771" x2="300" y2="811" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="900" y1="771" x2="900" y2="811" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="796" text-anchor="middle" font-size="12.5" fill="#475569">repositories persist  /  clients integrate</text>

